name: AI Appointment System CI

on:
  push:
    paths:
      - "ai-appointment-system/**"
      - ".github/workflows/ai-appointment-system-ci.yml"
  pull_request:
    paths:
      - "ai-appointment-system/**"
      - ".github/workflows/ai-appointment-system-ci.yml"
  workflow_dispatch:

jobs:
  test:
    name: Run automated tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ai-appointment-system

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install test dependency
        run: python -m pip install --upgrade pip pytest

      - name: Run tests
        run: python -m pytest tests -q -p no:cacheprovider

      - name: Generate maintainability report
        run: python scripts/measure_tests.py

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: ai-appointment-system-test-report
          path: |
            ai-appointment-system/reports/maintainability_report.md
            ai-appointment-system/reports/test_run_result.json

