name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build release package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package AI Appointment System
        run: |
          zip -r "ai-appointment-system-${{ steps.version.outputs.value }}.zip" ai-appointment-system .github -x "*/__pycache__/*" "*/.pytest_cache/*" "*/database/*"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          name: AI Appointment System ${{ steps.version.outputs.value }}
          generate_release_notes: true
          files: ai-appointment-system-${{ steps.version.outputs.value }}.zip
