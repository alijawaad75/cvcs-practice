name: Bug report
description: Report a reproducible bug in the AI Appointment System
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please give clear steps so it can be reproduced quickly.
  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: What went wrong?
      placeholder: The appointment form fails when...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to...
        2. Fill...
        3. Click...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Screenshots or logs
      description: Paste screenshots, terminal output, or CI links if available.
    validations:
      required: false

